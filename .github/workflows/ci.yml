name: CI

on:
  push:
    paths:
      - "sov_engine/**"
      - "sov_transport/**"
      - "sov_cli/**"
      - "sov_daemon/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - "BUILD.md"
      - "app/**"
      - ".github/workflows/**"
  # Run CI on every PR — minutes-cheap and avoids path-filter blind spots
  # where a docs-only PR silently skips lint/type checks (parking F-593530-015).
  pull_request:
  workflow_dispatch:
  # Daily canary at 14:00 UTC (morning Pacific). Catches upstream drift —
  # GH Actions runner image rotations, deprecated transitive deps, XRPL
  # testnet endpoint changes — even when no PRs are flowing
  # (parking F-593530-025).
  schedule:
    - cron: "0 14 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Top-level least-privilege default. pages.yml + publish.yml already have
# job-level permissions; this closes the gap (parking F-593530-011).
permissions:
  contents: read

jobs:
  lint-and-test:
    # Skip on schedule (canary runs the smoke instead) so we don't burn minutes
    # repeating the same lint/test work daily.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    # 2× headroom over observed ~5min healthy run-time; matrix overhead included.
    # CI failures often hang rather than crash — bound the wall-time (CI-TOOLING-B-004).
    timeout-minutes: 20
    strategy:
      # Don't cancel sibling matrix legs on a single failure — we want to know
      # whether 3.13 still passes when 3.11 fails (parking F-W4CIDOCS-004).
      fail-fast: false
      matrix:
        # Parking F-593530-010: 3.13 is in classifiers; CI must prove it.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355 # v5.2.2
        with:
          python-version: ${{ matrix.python-version }}

      # Parking F-593530-023: --frozen ensures CI uses locked versions.
      # --all-extras pulls in [xrpl] + [daemon] so mypy can resolve the
      # starlette/uvicorn imports in sov_daemon and pytest can exercise
      # the daemon test paths. Pre-Wave-11 CI used --dev only; that
      # broke the moment Wave 7-B's daemon code paths landed because
      # mypy + pytest don't know about optional extras at install time
      # (locally we install via `uv sync --all-extras` per CLAUDE.md).
      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev

      # Parking F-593530-014: --output-format=github surfaces inline PR
      # annotations on failed lint instead of forcing reviewers into raw logs.
      - name: Lint with ruff
        run: uv run ruff check --output-format=github .

      - name: Check formatting with ruff
        run: uv run ruff format --check .

      # mypy is now blocking. Combined with the xrpl-py override in
      # pyproject.toml + engine/transport type fixes, the strict gate stands.
      - name: Type-check with mypy
        if: matrix.python-version == '3.12'
        run: uv run mypy sov_engine sov_transport sov_cli sov_daemon

      # Stage C voice anti-pattern gate. Sub-second grep over user-facing
      # strings; runs before pytest so a copy-style regression fails fast
      # instead of waiting on the full suite. Single-leg policy mirrors
      # mypy: voice copy is a source-tree property, not a Python version
      # property — running it 3x adds zero signal. CI-TOOLING-C-001.
      - name: Voice anti-pattern gate
        if: matrix.python-version == '3.12'
        timeout-minutes: 1
        run: bash scripts/check-voice.sh

      # Curated -W error filters: catch our own deprecations without failing
      # on third-party noise (parking F-593530-014). The websockets/uvicorn
      # ignores come AFTER the error filters because pytest registers -W
      # flags at the front of ``warnings.filters`` in CLI order, so the
      # last-listed (=most-specific) filter wins for that module while the
      # broad error filter still catches our own deprecations elsewhere.
      # uvicorn 0.46 imports ``websockets.legacy`` + ``websockets.server``,
      # both deprecated in websockets 14.0; the warning fires inside the
      # SSE fixture's asyncio uvicorn-startup task, which pyproject-level
      # filterwarnings can't reach (the inner task has its own context).
      - name: Run tests
        run: |
          uv run pytest tests/ -v \
            -W error::DeprecationWarning \
            -W error::PendingDeprecationWarning \
            -W "ignore::DeprecationWarning:websockets" \
            -W "ignore::DeprecationWarning:websockets.legacy" \
            -W "ignore::DeprecationWarning:uvicorn.protocols.websockets.websockets_impl"

  # Wave 4 (v2.1) — Tauri shell + frontend gates. Linux-only by org policy
  # (.claude/rules/github-actions.md: macos ≈ 10× cost; cross-platform
  # validation is Wave 11's distribution concern). Matches the spec §12
  # acceptance gate exactly: cargo check + clippy -D warnings + fmt --check
  # + cargo test, then npm ci + typecheck + lint + test + build.
  tauri-and-frontend:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    # Cold Cargo + npm + Tauri build observed ~12min; 2.5× headroom for cache
    # misses and transient slow runners (CI-TOOLING-B-004).
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Tauri 2 webview deps. webkit2gtk-4.1 + libsoup-3.0 are the v2 line
      # (v1 was 4.0/2.4). libssl-dev satisfies reqwest in the Rust shell.
      - name: Install Tauri Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libssl-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable @ 2025-01
        with:
          toolchain: stable
          components: clippy, rustfmt

      # Cache Cargo registry + git index + target dir. Tauri cold builds
      # add minutes per CI run without this (coordinator-attention #4).
      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # actions/setup-node has built-in npm caching via cache: 'npm' +
      # cache-dependency-path — simpler than a separate actions/cache step.
      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      # npm ci (NOT install) — reproducible install from lockfile
      # (coordinator-attention #5).
      - name: Install frontend deps
        run: npm --prefix app ci

      # Sigstore signature verification on the resolved lockfile. WARN-ONLY at
      # v2.1 — many legitimate npm packages don't ship Sigstore signatures yet.
      # Tighten to fail-on-error at v2.2 once a one-cycle coverage baseline is
      # known (which packages support it, which don't). CI-TOOLING-B-003.
      - name: npm audit signatures (advisory)
        continue-on-error: true
        working-directory: app
        run: npm audit signatures

      # Rust gates — match acceptance-gate command order exactly.
      - name: Cargo check
        working-directory: app/src-tauri
        run: cargo check

      # cargo-audit RUSTSEC scan. Runs BEFORE clippy/test to fail fast on a
      # vulnerable dep without burning clippy wall-time. --deny warnings
      # promotes unmaintained / yanked-crate warnings to hard failures and
      # requires app/src-tauri/audit.toml to allowlist the gtk-rs / unic-* /
      # proc-macro-error / glib::VariantStrIter Linux-only baseline (tauri-shell
      # owns audit.toml; if absent, this step fails noisily — that's correct
      # behavior). CI-TOOLING-B-002.
      - name: Install cargo-audit
        # --locked respects cargo-audit's own Cargo.lock for reproducibility.
        # Version pin avoids silent major-bump breakage; bump deliberately.
        run: cargo install cargo-audit --locked --version "^0.21"

      - name: Cache cargo advisory DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/advisory-db
          # run_id key forces a refresh per CI run; advisories are
          # fast-moving and stale-cache risk > network cost.
          key: cargo-advisory-db-${{ github.run_id }}
          restore-keys: cargo-advisory-db-

      # Wave 11 hotfix 2026-05-02: cargo-audit fails to PARSE a malformed
      # upstream advisory file (RUSTSEC-2026-0073.md, libcrux-poly1305).
      # This is a RustSec advisory-db issue, not a vulnerability in our
      # tree. Tracked at https://github.com/RustSec/advisory-db/issues —
      # filed upstream. ``continue-on-error: true`` here to unblock the
      # release pipeline; revert to fail-closed when upstream lands a
      # parse-resilient cargo-audit (>=0.22?) or fixes the malformed
      # entry. Tracked in docs/v2.2-backlog.md under
      # "supply-chain hard-gate maintenance."
      - name: Cargo audit
        working-directory: app/src-tauri
        continue-on-error: true
        run: cargo audit --deny warnings

      - name: Cargo clippy
        working-directory: app/src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Cargo fmt --check
        working-directory: app/src-tauri
        run: cargo fmt --check

      - name: Cargo test
        working-directory: app/src-tauri
        run: cargo test

      # Frontend gates — match acceptance-gate command order.
      - name: Frontend typecheck
        run: npm --prefix app run typecheck

      - name: Frontend lint
        run: npm --prefix app run lint

      # Stage D theme-token discipline gate. Sub-second grep over
      # app/src/**/*.{tsx,module.css} for bare hex / rgba outside
      # theme.css. Runs before vitest so a token-style regression
      # fails fast. Single-leg policy mirrors check-voice.sh: token
      # discipline is a source-tree property, not a Node version
      # property. CI-TOOLING-D-002.
      - name: Theme-token discipline gate
        timeout-minutes: 1
        run: bash scripts/check-theme-tokens.sh

      - name: Frontend test
        run: npm --prefix app test

      - name: Frontend build
        run: npm --prefix app run build

  # Supply-chain hard-gate scan. pip-audit promoted from advisory to fail-on-HIGH
  # in Stage B-2 (Wave 7-B) per Stage B target C lock. Allowlist mechanism via
  # .pip-audit-ignore at repo root (one PYSEC/GHSA/CVE id per line, # comments
  # ok). gitleaks remains advisory at v2.1; promotion to hard gate deferred to
  # v2.2 alongside the .gitleaks.toml / cargo-deny / deny.toml allowlist policy
  # surface design pass.
  security:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    # uv sync + pip-audit DB fetch + gitleaks scan; healthy run ~3min
    # (CI-TOOLING-B-004).
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355 # v5.2.2
        with:
          python-version: "3.12"

      - name: Install dependencies
        # --all-extras includes [xrpl] + [daemon] so pip-audit covers the
        # full transitive set users actually install (matches lint-and-test
        # job; mirrors local `uv sync --all-extras` per CLAUDE.md).
        run: uv sync --frozen --all-extras --dev

      # Cache PyPA advisory DB to amortize the network fetch. run_id key
      # forces a refresh per run — advisories are fast-moving and a stale
      # cache is more dangerous than the per-run fetch cost.
      - name: Cache pip-audit advisory DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip-audit
          key: pip-audit-db-${{ github.run_id }}
          restore-keys: pip-audit-db-

      # pip-audit HARD GATE — fails on any unfixed advisory. Allowlist via
      # .pip-audit-ignore (one PYSEC/GHSA/CVE id per line; # comments ok).
      # CI-TOOLING-B-001.
      - name: pip-audit (HIGH gate)
        run: |
          uv pip install pip-audit
          # Build --ignore-vuln args from allowlist file if present.
          ALLOWLIST_ARGS=""
          if [ -f .pip-audit-ignore ]; then
            while IFS= read -r line; do
              # Strip trailing inline rationale comment + whitespace
              entry="${line%%#*}"
              entry="${entry// /}"
              entry="${entry//$'\t'/}"
              [ -z "$entry" ] && continue
              ALLOWLIST_ARGS="$ALLOWLIST_ARGS --ignore-vuln $entry"
            done < .pip-audit-ignore
          fi
          # pip-audit fails on any unfixed advisory by default; --strict is
          # for signature verification (different concern) and conflicts with
          # positional --ignore-vuln args. Allowlist is the failure-mode gate.
          uv run pip-audit $ALLOWLIST_ARGS

      - name: Secret scan with gitleaks (advisory)
        continue-on-error: true
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.6
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # Canary CLI smoke. Runs on workflow_dispatch (manual) AND on a daily cron
  # so we catch upstream environmental drift even when no PRs are flowing
  # (parking F-593530-025). 14:00 UTC = morning Pacific.
  canary:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    # uv sync + 3 CLI invocations; healthy run ~2min (CI-TOOLING-B-004).
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355 # v5.2.2
        with:
          python-version: "3.12"

      # --all-extras so the canary smoke can exercise `sov daemon --help`
      # (the daemon Typer subapp's import chain hits starlette/uvicorn at
      # CLI-load time when [daemon] is installed). Mirrors lint-and-test +
      # security job dependency installs.
      - run: uv sync --frozen --all-extras

      - name: CLI smoke
        run: |
          uv run sov --help
          uv run sov self-check
          uv run sov doctor
