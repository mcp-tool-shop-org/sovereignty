# Combined release workflow: PyPI publish + platform binaries.
# Asset naming convention (locked):
#   sovereignty-<version>-<os>-<arch>[.exe]            (PyInstaller CLI)
#   sovereignty-app-<version>-<target>.<dmg|msi|AppImage>  (Tauri desktop app, v2.1+)
#   checksums-<version>.txt
#
# v2.1 BRIDGE-A-bis-003 distribution context: PyInstaller CLI binaries ship the
# Python ``sov`` command (already in place since v2.0). Wave 11 added the Tauri
# shell binary matrix alongside — built from ``app/src-tauri/`` via
# ``npm --prefix app run tauri build``, attested by
# ``actions/attest-build-provenance``, and uploaded to the same GH Release. NO
# OS-level code signing in v2.1 — workspace-level signing infrastructure
# (Apple Developer ID + Authenticode) ships in v2.2 (see docs/v2.2-backlog.md).
# Users see first-launch OS warnings; supply-chain provenance is verifiable
# via ``gh attestation verify``.

name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- PyPI publish (trusted publishing via OIDC) ---
  # Locked spec adjustment #4: publish MUST depend on build-binaries success
  # so a major-version PyPI release is never shipped without the binaries that
  # `npx @mcptoolshop/sovereignty` consumers resolve from the GitHub Release.
  # Fail-closed on `release` events; allow workflow_dispatch publish-only runs
  # for hotfix scenarios documented in BUILD.md.
  publish:
    if: github.event_name == 'release'
    needs: [build-binaries, build-tauri-binaries]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Verify version matches tag
        if: github.event_name == 'release'
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::pyproject.toml version $VERSION does not match git tag $TAG"
            exit 1
          fi

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      # Pre-publish wheel smoke test. Catches the fail-open window between
      # hatchling build success and PyPI push (import error, missing data
      # file, broken entry point). Bounded ~2 min CI cost.
      - name: Install jq for status assertion
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Smoke test built wheel in fresh venv
        shell: bash
        run: |
          set -euo pipefail
          SMOKE_DIR="$(mktemp -d)"
          # hatchling produces sovereignty_game-*.whl (PEP 503 underscore form);
          # `|| true` defangs `set -euo pipefail` propagating ls's nonzero exit
          # when the glob has no matches, so the defensive empty-WHEEL check
          # below can actually run. v2.0.0 shipped with two glob patterns
          # (underscore + hyphen) — the hyphen variant matched nothing and
          # killed the script via set -e BEFORE the if check; v2.0.1 fixes that.
          WHEEL=$(ls dist/sovereignty_game-*.whl 2>/dev/null | head -n1 || true)
          if [ -z "$WHEEL" ]; then
            echo "::error::No built wheel found under dist/"
            ls -la dist/
            exit 1
          fi
          echo "Smoke-testing wheel: $WHEEL"
          python -m venv "$SMOKE_DIR/venv"
          # shellcheck disable=SC1091
          source "$SMOKE_DIR/venv/bin/activate"
          pip install --upgrade pip
          # Install with both extras. The [daemon] extra brings in
          # starlette/uvicorn/httpx — if any are missing, the daemon Typer
          # subapp's import fails at CLI-load time and breaks ALL `sov`
          # invocations (not just `sov daemon ...`). The `sov daemon --help`
          # check below is a load-bearing surface verification.
          pip install "${WHEEL}[xrpl,daemon]"
          # 1. --version exits 0 with a non-empty version line
          VERSION_OUT=$(sov --version)
          echo "sov --version => $VERSION_OUT"
          [ -n "$VERSION_OUT" ] || { echo "::error::sov --version produced empty output"; exit 1; }
          # 2. --help exits 0 and mentions the binary name
          HELP_OUT=$(sov --help)
          echo "$HELP_OUT" | grep -q "sov" || { echo "::error::sov --help missing binary name"; exit 1; }
          # 3. self-check JSON status must be ok or warn (not fail)
          STATUS=$(sov self-check --json | jq -r .status)
          echo "sov self-check --json status => $STATUS"
          case "$STATUS" in
            ok|warn) echo "Smoke test passed." ;;
            *) echo "::error::sov self-check --json reported status=$STATUS (expected ok|warn)"; exit 1 ;;
          esac
          # 4. Verify the daemon Typer subapp is wired (import surface check
          # for the [daemon] extra — does NOT start the server). If
          # uvicorn/starlette aren't actually installed, this fails because
          # the subapp import chain hits a missing dep.
          sov daemon --help > /dev/null || { echo "::error::sov daemon --help failed — [daemon] extra not wired"; exit 1; }
          deactivate
          rm -rf "$SMOKE_DIR"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@67339c736fd9354cd4f8cb0b744f2b82a74b5c70 # release/v1 (v1.12.3)

  # --- Platform binaries (PyInstaller) ---
  build-binaries:
    if: github.event_name == 'release'
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            ext: ""
          - os: macos-latest
            target: darwin-arm64
            ext: ""
          # darwin-x64 omitted: macos-13 deprecated, arm64 binary works via Rosetta
          - os: windows-latest
            target: win-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355 # v5.2.2

      - run: uv python install 3.12

      - run: uv venv

      # Pin PyInstaller exactly for reproducible release builds.
      # Bump deliberately after smoke testing the produced binary.
      - name: Install dependencies + PyInstaller
        run: uv pip install . "pyinstaller==6.11.1"

      - name: Build binary
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          uv run pyinstaller --onefile --name "sovereignty" --console \
            --collect-submodules rich \
            --collect-data xrpl \
            sov_cli/__main__.py
          OUTNAME="sovereignty-${VERSION}-${{ matrix.target }}${{ matrix.ext }}"
          mv "dist/sovereignty${{ matrix.ext }}" "dist/${OUTNAME}"
          echo "ASSET_NAME=${OUTNAME}" >> "$GITHUB_ENV"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1.4.4
        with:
          subject-path: dist/${{ env.ASSET_NAME }}

      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: binary-${{ matrix.target }}
          path: dist/${{ env.ASSET_NAME }}

  # --- Tauri desktop app binaries (v2.1+) ---
  # Wave 11 BRIDGE-A-bis-003 distribution: build the Tauri shell on each
  # platform and ship the OS-native installer alongside the PyInstaller CLI
  # binaries. NO Apple/Microsoft signing — first-launch OS warnings are
  # expected and documented in README. Build provenance via
  # ``actions/attest-build-provenance`` covers the supply-chain trust layer.
  # Workspace-level signing infrastructure (Apple Developer ID +
  # Authenticode) is v2.2 work that benefits sovereignty + GlyphStudio +
  # CommandUI together.
  build-tauri-binaries:
    if: github.event_name == 'release'
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-universal
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: "--target universal-apple-darwin"
            bundle-base: app/src-tauri/target/universal-apple-darwin/release/bundle
            artifacts: |
              dmg/Sovereignty_*_universal.dmg
          - os: windows-latest
            target: win-x64
            rust-targets: ""
            tauri-args: ""
            bundle-base: app/src-tauri/target/release/bundle
            artifacts: |
              msi/Sovereignty_*_x64_en-US.msi
          - os: ubuntu-latest
            target: linux-x64
            rust-targets: ""
            tauri-args: ""
            bundle-base: app/src-tauri/target/release/bundle
            artifacts: |
              appimage/sovereignty_*_amd64.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Tauri 2 webview + AppImage bundler deps (Linux only). webkit2gtk-4.1
      # + libsoup-3.0 are the v2 line; libssl-dev satisfies reqwest. libfuse2
      # is required by ``linuxdeploy`` (the AppImage bundler Tauri runs at
      # bundle time) — without it bundle fails with ``failed to run
      # linuxdeploy`` even though the underlying Rust binary builds clean.
      - name: Install Tauri Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libssl-dev libfuse2

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable @ 2025-01
        with:
          toolchain: stable
          targets: ${{ matrix.rust-targets }}

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install frontend deps
        run: npm --prefix app ci

      - name: Build Tauri app
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix app run tauri build -- ${{ matrix.tauri-args }}

      # Stage artifacts under a flat dist/ with the locked naming convention:
      # ``sovereignty-app-<version>-<target>.<ext>``. The ``-app-`` infix
      # disambiguates from the existing PyInstaller CLI binaries which use
      # ``sovereignty-<version>-<target>``. Mac ships .dmg only at v2.1
      # (the .app.tar.gz duplicate is auto-update-update bundle territory,
      # deferred to v2.2 alongside the Tauri 2 updater).
      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p dist
          for src in $(ls ${{ matrix.bundle-base }}/${{ matrix.artifacts }} 2>/dev/null); do
            ext="${src##*.}"
            outname="sovereignty-app-${VERSION}-${{ matrix.target }}.${ext}"
            cp "$src" "dist/${outname}"
            echo "Staged: dist/${outname}"
          done
          ls -la dist/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1.4.4
        with:
          subject-path: dist/sovereignty-app-*

      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: tauri-binary-${{ matrix.target }}
          path: dist/sovereignty-app-*

  upload-binaries:
    if: github.event_name == 'release'
    needs: [build-binaries, build-tauri-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF_NAME#v}
          cd artifacts
          sha256sum * > "checksums-${VERSION}.txt"
          cat "checksums-${VERSION}.txt"

      # Attest the checksums file as well so downstream verifiers can prove
      # the manifest itself came from this workflow (covers F-593530-019).
      - name: Attest checksum manifest
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1.4.4
        with:
          subject-path: artifacts/checksums-*.txt

      - uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: artifacts/*
