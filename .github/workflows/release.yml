# Combined release workflow: PyPI publish + platform binaries.
# Asset naming convention (locked):
#   sovereignty-<version>-<os>-<arch>[.exe]
#   checksums-<version>.txt

name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- PyPI publish (trusted publishing via OIDC) ---
  # Locked spec adjustment #4: publish MUST depend on build-binaries success
  # so a major-version PyPI release is never shipped without the binaries that
  # `npx @mcptoolshop/sovereignty` consumers resolve from the GitHub Release.
  # Fail-closed on `release` events; allow workflow_dispatch publish-only runs
  # for hotfix scenarios documented in BUILD.md.
  publish:
    if: github.event_name == 'release'
    needs: [build-binaries]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Verify version matches tag
        if: github.event_name == 'release'
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::pyproject.toml version $VERSION does not match git tag $TAG"
            exit 1
          fi

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@67339c736fd9354cd4f8cb0b744f2b82a74b5c70 # release/v1 (v1.12.3)

  # --- Platform binaries (PyInstaller) ---
  build-binaries:
    if: github.event_name == 'release'
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            ext: ""
          - os: macos-latest
            target: darwin-arm64
            ext: ""
          # darwin-x64 omitted: macos-13 deprecated, arm64 binary works via Rosetta
          - os: windows-latest
            target: win-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355 # v5.2.2

      - run: uv python install 3.12

      - run: uv venv

      # Pin PyInstaller exactly for reproducible release builds.
      # Bump deliberately after smoke testing the produced binary.
      - name: Install dependencies + PyInstaller
        run: uv pip install . "pyinstaller==6.11.1"

      - name: Build binary
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          uv run pyinstaller --onefile --name "sovereignty" --console \
            --collect-submodules rich \
            --collect-data xrpl \
            sov_cli/__main__.py
          OUTNAME="sovereignty-${VERSION}-${{ matrix.target }}${{ matrix.ext }}"
          mv "dist/sovereignty${{ matrix.ext }}" "dist/${OUTNAME}"
          echo "ASSET_NAME=${OUTNAME}" >> "$GITHUB_ENV"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1.4.4
        with:
          subject-path: dist/${{ env.ASSET_NAME }}

      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: binary-${{ matrix.target }}
          path: dist/${{ env.ASSET_NAME }}

  upload-binaries:
    if: github.event_name == 'release'
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF_NAME#v}
          cd artifacts
          sha256sum * > "checksums-${VERSION}.txt"
          cat "checksums-${VERSION}.txt"

      # Attest the checksums file as well so downstream verifiers can prove
      # the manifest itself came from this workflow (covers F-593530-019).
      - name: Attest checksum manifest
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1.4.4
        with:
          subject-path: artifacts/checksums-*.txt

      - uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: artifacts/*
