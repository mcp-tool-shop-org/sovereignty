name: CI

on:
  push:
    paths:
      - "sov_engine/**"
      - "sov_transport/**"
      - "sov_cli/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "sov_engine/**"
      - "sov_transport/**"
      - "sov_cli/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355 # v5.2.2
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check .

      # Advisory until pre-existing type debt is cleaned up (Stage B work item).
      # Once `uv run mypy` is clean, drop continue-on-error to make this gate blocking.
      - name: Type-check with mypy (advisory)
        if: matrix.python-version == '3.12'
        continue-on-error: true
        run: uv run mypy sov_engine sov_transport sov_cli

      - name: Run tests
        run: uv run pytest tests/ -v

  # Manual-only canary: quick CLI smoke test (dry-run, no real testnet)
  # Trigger via: Actions → CI → Run workflow
  canary:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355 # v5.2.2
        with:
          python-version: "3.12"

      - run: uv sync

      - name: CLI smoke
        run: |
          uv run sov --help
          uv run sov self-check
          uv run sov doctor
