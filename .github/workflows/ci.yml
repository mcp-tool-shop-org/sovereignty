name: CI

on:
  push:
    paths:
      - "sov_engine/**"
      - "sov_transport/**"
      - "sov_cli/**"
      - "sov_daemon/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - "BUILD.md"
      - "app/**"
      - ".github/workflows/**"
  # Run CI on every PR — minutes-cheap and avoids path-filter blind spots
  # where a docs-only PR silently skips lint/type checks (parking F-593530-015).
  pull_request:
  workflow_dispatch:
  # Daily canary at 14:00 UTC (morning Pacific). Catches upstream drift —
  # GH Actions runner image rotations, deprecated transitive deps, XRPL
  # testnet endpoint changes — even when no PRs are flowing
  # (parking F-593530-025).
  schedule:
    - cron: "0 14 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Top-level least-privilege default. pages.yml + publish.yml already have
# job-level permissions; this closes the gap (parking F-593530-011).
permissions:
  contents: read

jobs:
  lint-and-test:
    # Skip on schedule (canary runs the smoke instead) so we don't burn minutes
    # repeating the same lint/test work daily.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel sibling matrix legs on a single failure — we want to know
      # whether 3.13 still passes when 3.11 fails (parking F-W4CIDOCS-004).
      fail-fast: false
      matrix:
        # Parking F-593530-010: 3.13 is in classifiers; CI must prove it.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355 # v5.2.2
        with:
          python-version: ${{ matrix.python-version }}

      # Parking F-593530-023: --frozen ensures CI uses locked versions.
      - name: Install dependencies
        run: uv sync --frozen --dev

      # Parking F-593530-014: --output-format=github surfaces inline PR
      # annotations on failed lint instead of forcing reviewers into raw logs.
      - name: Lint with ruff
        run: uv run ruff check --output-format=github .

      - name: Check formatting with ruff
        run: uv run ruff format --check .

      # mypy is now blocking. Combined with the xrpl-py override in
      # pyproject.toml + engine/transport type fixes, the strict gate stands.
      - name: Type-check with mypy
        if: matrix.python-version == '3.12'
        run: uv run mypy sov_engine sov_transport sov_cli sov_daemon

      # Curated -W error filters: catch our own deprecations without failing
      # on third-party noise (parking F-593530-014).
      - name: Run tests
        run: uv run pytest tests/ -v -W error::DeprecationWarning -W error::PendingDeprecationWarning

  # Wave 4 (v2.1) — Tauri shell + frontend gates. Linux-only by org policy
  # (.claude/rules/github-actions.md: macos ≈ 10× cost; cross-platform
  # validation is Wave 11's distribution concern). Matches the spec §12
  # acceptance gate exactly: cargo check + clippy -D warnings + fmt --check
  # + cargo test, then npm ci + typecheck + lint + test + build.
  tauri-and-frontend:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Tauri 2 webview deps. webkit2gtk-4.1 + libsoup-3.0 are the v2 line
      # (v1 was 4.0/2.4). libssl-dev satisfies reqwest in the Rust shell.
      - name: Install Tauri Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libssl-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable @ 2025-01
        with:
          toolchain: stable
          components: clippy, rustfmt

      # Cache Cargo registry + git index + target dir. Tauri cold builds
      # add minutes per CI run without this (coordinator-attention #4).
      - name: Cache Cargo
        uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # actions/setup-node has built-in npm caching via cache: 'npm' +
      # cache-dependency-path — simpler than a separate actions/cache step.
      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      # npm ci (NOT install) — reproducible install from lockfile
      # (coordinator-attention #5).
      - name: Install frontend deps
        run: npm --prefix app ci

      # Rust gates — match acceptance-gate command order exactly.
      - name: Cargo check
        working-directory: app/src-tauri
        run: cargo check

      - name: Cargo clippy
        working-directory: app/src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Cargo fmt --check
        working-directory: app/src-tauri
        run: cargo fmt --check

      - name: Cargo test
        working-directory: app/src-tauri
        run: cargo test

      # Frontend gates — match acceptance-gate command order.
      - name: Frontend typecheck
        run: npm --prefix app run typecheck

      - name: Frontend lint
        run: npm --prefix app run lint

      - name: Frontend test
        run: npm --prefix app test

      - name: Frontend build
        run: npm --prefix app run build

  # Supply-chain advisory scan. Advisory in Stage B (continue-on-error) so
  # transitive low-severity items don't block PRs; tighten in Stage B-2.
  security:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355 # v5.2.2
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: pip-audit (advisory)
        continue-on-error: true
        run: |
          uv pip install pip-audit
          uv run pip-audit

      - name: Secret scan with gitleaks (advisory)
        continue-on-error: true
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.6
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # Canary CLI smoke. Runs on workflow_dispatch (manual) AND on a daily cron
  # so we catch upstream environmental drift even when no PRs are flowing
  # (parking F-593530-025). 14:00 UTC = morning Pacific.
  canary:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: astral-sh/setup-uv@4db96194c378173c656ce18a155ffc14a9fc4355 # v5.2.2
        with:
          python-version: "3.12"

      - run: uv sync --frozen

      - name: CLI smoke
        run: |
          uv run sov --help
          uv run sov self-check
          uv run sov doctor
