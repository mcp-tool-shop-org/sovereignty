<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sovereignty — Campfire Board (A · Parchment Heritage)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IM+Fell+English:ital@0;1&family=Fraunces:opsz,wght,SOFT@9..144,300..700,0..100&display=swap" rel="stylesheet">
<style>
  @page { size: 8.5in 11in; margin: 0; }
  html, body { margin: 0; padding: 0; background: #2a221a; }
  body { display: flex; justify-content: center; }
  #board-host { transform-origin: top center; }
  @media print {
    body { background: #fff; }
    #board-host { transform: none !important; }
  }
</style>
</head>
<body>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tile-icons.jsx"></script>
  <script type="text/babel" src="tile-data.jsx"></script>
  <script type="text/babel" src="board-a.jsx"></script>
  <div id="board-host"></div>
  <script type="text/babel" data-presets="env,react">
    const host = document.getElementById('board-host');
    function fit() {
      const s = Math.min(window.innerWidth / 1700, window.innerHeight / 2200, 1);
      host.style.transform = `scale(${s})`;
      host.style.width = '1700px';
    }
    window.addEventListener('resize', fit);
    ReactDOM.createRoot(host).render(<window.SovBoardA />);
    requestAnimationFrame(fit);
  </script>
</body>
</html>
