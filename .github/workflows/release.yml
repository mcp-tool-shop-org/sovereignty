# Combined release workflow: PyPI publish + platform binaries.
# Asset naming convention (locked):
#   sovereignty-<version>-<os>-<arch>[.exe]
#   checksums-<version>.txt

name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- PyPI publish (trusted publishing via OIDC) ---
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # --- Platform binaries (PyInstaller) ---
  build-binaries:
    if: github.event_name == 'release'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            ext: ""
          - os: macos-latest
            target: darwin-arm64
            ext: ""
          # darwin-x64 omitted: macos-13 deprecated, arm64 binary works via Rosetta
          - os: windows-latest
            target: win-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - run: uv python install 3.12

      - run: uv venv

      - name: Install dependencies + PyInstaller
        run: uv pip install . "pyinstaller>=6.9.0"

      - name: Build binary
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          uv run pyinstaller --onefile --name "sovereignty" --console \
            --collect-submodules rich \
            --collect-data xrpl \
            sov_cli/__main__.py
          OUTNAME="sovereignty-${VERSION}-${{ matrix.target }}${{ matrix.ext }}"
          mv "dist/sovereignty${{ matrix.ext }}" "dist/${OUTNAME}"
          echo "ASSET_NAME=${OUTNAME}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/${{ env.ASSET_NAME }}

  upload-binaries:
    if: github.event_name == 'release'
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd artifacts
          sha256sum * > "checksums-${VERSION}.txt"
          cat "checksums-${VERSION}.txt"

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
